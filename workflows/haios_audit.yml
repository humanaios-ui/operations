name: HumanAIOS Standing Audit

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: A1 — Stale dimension count
        run: |
          echo "Checking for stale 6-dimension references..."
          if [ ! -d "public" ]; then
            echo "::warning title=A1 AUDIT::SKIPPED — target directory not found"
          elif grep -rl "six.dimension\|6.dimension\|6-dimension" --include="*.html" public/ 2>/dev/null; then
            echo "::warning title=A1 AUDIT::Stale dimension count found — instrument is 11 dimensions"
          else
            echo "✅ A1 PASS — no stale dimension references"
          fi

      - name: A4 — Secrets scan
        run: |
          echo "Scanning for credential patterns..."
          if grep -rl "rah_[a-zA-Z0-9]\|sk-ant\|ghp_\|cfut_\|API_KEY\|SECRET_KEY" \
            --include="*.html" --include="*.js" --include="*.json" \
            --include="*.yml" --include="*.md" \
            --exclude-dir=node_modules --exclude-dir=dist . 2>/dev/null; then
            echo "::error title=A4 AUDIT::Potential credential exposure found"
            exit 1
          else
            echo "✅ A4 PASS — no credential patterns found"
          fi

      - name: A5 — Security closed items check
        run: |
          echo "Verifying SECURITY_CLOSED.md exists..."
          if [ -f "audit/SECURITY_CLOSED.md" ]; then
            echo "✅ A5 PASS — SECURITY_CLOSED.md present"
          else
            echo "::warning title=A5 AUDIT::audit/SECURITY_CLOSED.md missing — failsafe not in place"
          fi

      - name: A6 — Cherokee check (Principle 12)
        run: |
          echo "Checking for Cherokee references on public surfaces..."
          if [ ! -d "public" ]; then
            echo "::warning title=A6 AUDIT::SKIPPED — target directory not found"
          elif grep -rl "Cherokee\|cherokee" --include="*.html" --include="*.md" public/ 2>/dev/null; then
            echo "::warning title=A6 AUDIT::Cherokee reference found on public surface — Principle 12 violation"
          else
            echo "✅ A6 PASS — no Cherokee references on public surfaces"
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: A7 — Primary check gate (blocking)
        run: |
          echo "Deploying primary_check_gate_v1_0.py..."

          # Verify gate file exists
          if [ ! -f "operations/autonomy/gates/primary_check_gate_v1_0.py" ]; then
            echo "::error title=A7 AUDIT::primary_check_gate_v1_0.py not found at operations/autonomy/gates/"
            exit 1
          fi

          echo "Running smoke test..."
          python3 operations/autonomy/gates/primary_check_gate_v1_0.py --smoke-test
          SMOKE_TEST_EXIT=$?

          if [ $SMOKE_TEST_EXIT -ne 0 ]; then
            echo "::error title=A7 AUDIT::Primary check gate smoke test FAILED"
            exit 1
          fi

          echo "✅ A7 PASS — Primary check gate deployed and verified"
          echo "  • Gate enforces: all audit claims must have VerificationRecords"
          echo "  • Pattern: ClaimNotAdmissible raised on unverified claims"
          echo "  • Arbitration: rerun_and_arbitrate() on claim disagreement"

      - name: Audit summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "HumanAIOS Audit Complete"
          echo "Date: $(date -u)"
          echo "Repo: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
