name: document-control

# Phase 2 gate (errors-only). Blocks merge on structural controlled-document
# violations. Advisory checks (Vale prose, external-link rot) are added in a
# later phase as warnings. See DOCUMENT_CONTROL_PLAN.md §4.

on:
  pull_request:
    paths:
      - "**/*.md"
      - "document-registry.yaml"
      - ".doc-control/**"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "document-registry.yaml"
      - ".doc-control/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install deps
        run: pip install --quiet pyyaml
      - name: Registry + frontmatter integrity (ERROR — blocks merge)
        run: python3 .doc-control/validate.py
      - name: Markdown lint (ERROR — blocks merge)
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            #node_modules
      - name: Internal link check (ERROR — blocks merge)
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--offline --no-progress './**/*.md'"
          fail: true
