name: scorecard-security

# Review-panel LAYER 1 — supply-chain / security posture (OpenSSF Scorecard).
# CI-native, no external server needed. Results upload to code scanning (Security tab).
# Pin the action to a full commit SHA before enabling in production (supply-chain).

on:
  branch_protection_rule:
  schedule:
    - cron: "0 8 * * 1"   # weekly, Monday 08:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF results
      id-token: write          # publish results / OIDC
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false   # set true only after review
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: scorecard-results.sarif
