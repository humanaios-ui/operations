name: Track SonarCloud Issues

# Triggered after SonarCloud scan completes to create GitHub issues for violations
# This provides a bridge between SonarCloud findings and GitHub issue tracking

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  track-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get SonarCloud scan results
        id: sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "::notice::SonarCloud not configured. Skipping issue tracking."
            echo "configured=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "configured=true" >> $GITHUB_OUTPUT

          # Query SonarCloud API for new issues
          # This is a placeholder - replace with actual API call to your SonarCloud instance
          echo "::notice::SonarCloud issue tracking configured. Issues will be tracked in PRs via SonarCloud status checks."

      - name: Report SonarCloud findings
        if: steps.sonar.outputs.configured == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create status summary comment if on a PR
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "::notice::Code quality check results available in SonarCloud - click 'Details' on the sonarqube-quality status check"
          fi

          # For main branch pushes, comment with quality gate status
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "::notice::SonarCloud scan completed on main branch. Review results at: https://sonarcloud.io/project/overview?id=humanaios-ui_operations"
          fi

      - name: Set up Python for issue creation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create issues for BLOCKER violations (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          python3 << 'PYTHON'
          import os
          import json
          import subprocess
          from datetime import datetime

          # This script would:
          # 1. Query SonarCloud API for new BLOCKER issues
          # 2. Check if GitHub issue already exists for this issue
          # 3. Create new GitHub issue if not found
          # 4. Add labels, assignees, and link back to SonarCloud

          sonar_token = os.environ.get("SONAR_TOKEN", "")
          sonar_host = os.environ.get("SONAR_HOST_URL", "")
          github_token = os.environ.get("GITHUB_TOKEN", "")

          if not sonar_token or not sonar_host:
              print("SonarCloud not configured")
              exit(0)

          # TODO: Implement actual SonarCloud API call
          # For now, just log that the system is ready
          print(f"✓ SonarCloud issue tracking system is configured")
          print(f"  Organization: humanaios-ui")
          print(f"  Project: operations")
          print(f"  Host: {sonar_host}")

          PYTHON

      - name: Post workflow status
        if: always()
        run: |
          echo "::notice::SonarQube quality check complete. Review detailed results on SonarCloud: https://sonarcloud.io/organizations/humanaios-ui/projects"
