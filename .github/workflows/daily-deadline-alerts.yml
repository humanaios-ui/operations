name: Daily Deadline Alerts

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-deadlines:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Check for upcoming deadlines and send alerts
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          PYTHONPATH: ./src
        run: |
          if ! python -c "import humanaios_operations.deadline_checker" 2>/dev/null; then
            echo "⚠️  humanaios_operations.deadline_checker module not found — skipping"
            echo "To enable: ensure src/humanaios_operations/deadline_checker.py exists"
            exit 0
          fi
          if [ -z "$SMTP_HOST" ]; then
            echo "⚠️  Email not configured. Running deadline check in dry-run mode."
            echo "To enable alerts: add SMTP secrets to GitHub Secrets"
            python -m humanaios_operations.deadline_checker check --dry-run
          else
            python -m humanaios_operations.deadline_checker check
          fi
