name: Daily Deadline Alerts

on:
  schedule:
    # Run daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-deadlines:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Check for upcoming deadlines and send alerts
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          PYTHONPATH: ./src
        run: |
          if [ -z "$SMTP_HOST" ]; then
            echo "⚠️  Email not configured. Skipping deadline alerts."
            echo "To enable: add SMTP secrets to GitHub Secrets"
            python -m humanaios_operations.deadline_checker check --dry-run
          else
            python -m humanaios_operations.deadline_checker check
          fi

      - name: Comment on issues if deadlines are urgent
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⏰ Deadline alert: Check workflow logs for urgent funding deadlines.'
            })
