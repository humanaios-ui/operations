name: claude-review

# Review-panel LAYER 4 — LLM reviewer (Claude Code) for the perspective-diverse panel.
# Copilot code review is the second LLM reviewer (already wired via
# auto-request-copilot-review.yml). Together they form the LLM panel.
#
# DORMANT until configured: requires the Anthropic GitHub App installed on the repo
# AND an ANTHROPIC_API_KEY secret. The guard step skips cleanly when absent, so this
# is safe to merge before setup. Per-PR token cost applies once enabled.
#
# NOTE: verify the action ref + inputs against current Anthropic docs before enabling
# and pin to a full commit SHA (supply-chain). The review lens below asks specifically
# for the failure modes this audit surfaced (behavioral-not-marker; no gamed gates).

on:
  pull_request:
    types: [opened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — is the Claude reviewer configured?
        id: guard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not set — Claude review layer dormant. Install the Anthropic GitHub App + add ANTHROPIC_API_KEY to enable."
          fi
      - name: Checkout
        if: steps.guard.outputs.configured == 'true'
        uses: actions/checkout@v4
      - name: Claude review
        if: steps.guard.outputs.configured == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR as a behavioral verifier for the S-070726 audit standard.
            Check specifically:
              1. Behavioral, not marker-presence — do functions have real bodies,
                 no dead code after `return`, endpoints importable/smoke-testable?
                 (This is the IC-045 class: a change can pass a token scanner while
                 being functionally broken.)
              2. Does the PR's stated intent match its actual diff (self-report vs
                 demonstrated behavior)? Flag any gap.
              3. Are tests shipped that fail on the bad case and pass on the good?
            Post a concise review with a merge recommendation and a one-line SMAG note
            (predicted vs measured vs gap) for the pilot ledger.
