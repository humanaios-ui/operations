# ============================================================
# HAIOS Harmonizer Pulse — Scheduled System Health Signal
# File: .github/workflows/haios-harmonizer-pulse.yml
# Repo: humanaios-ui/operations
#
# PURPOSE:
#   Runs haios_harmonizer_v1_0.py every 8 hours. Computes
#   harmony scores across all 8 subsystems and posts tuning
#   signals (ESCALATE / CONVERGE / ADVANCE / MAINTAIN) to
#   #wgs-sync and #acat-monitor.
#
# MKS MAPPING (MKS-01 — Subconscious Mind):
#   "The Subconscious Mind executes without argument. Once a
#   thought is accepted and sent to it, it executes with complete
#   fidelity." The harmonizer IS the automated Subconscious —
#   but only if it actually runs autonomously. Without this cron,
#   it requires the Conscious Mind (Night / session) to invoke it
#   manually. That means it runs perhaps once a day, in a session,
#   rather than continuously as a true background process.
#   This job activates the Subconscious.
#
# NOTE ON WGS-COMMS-HARMONIZER (Make):
#   The Make scenario WGS-COMMS-HARMONIZER was stated to cover
#   #wgs-sync, #acat-monitor, and #ai-contributions every 8 hours.
#   This GitHub Actions job is the verified, version-controlled
#   equivalent. It supersedes the Make scenario for harmonizer
#   pulse delivery. The Make scenario may remain for other
#   communications routing; this job owns the health pulse.
#
# TUNING SIGNAL PRIORITY (per haios_harmonizer_v1_0):
#   1. HARD_BLOCK  — active blocker, all other work secondary
#   2. ESCALATE    — carry_N >= 10, surface immediately
#   3. CONVERGE    — subsystem harmony < 50, needs focused session
#   4. ADVANCE     — gate pre-conditions met, path clear
#   5. MAINTAIN    — system healthy, continue trajectory
#
# OUTPUTS:
#   - MAINTAIN / ADVANCE  → #acat-monitor only (low noise)
#   - CONVERGE            → #acat-monitor + #wgs-sync
#   - ESCALATE            → #acat-monitor + #wgs-sync (highlighted)
#   - HARD_BLOCK          → #acat-monitor + #wgs-sync (urgent)
#   - MOLT_READY          → #acat-monitor + #wgs-sync (milestone)
#
# SECRETS REQUIRED:
#   SUPABASE_URL        — Supabase project URL
#   SUPABASE_KEY        — Supabase anon/service key
#   SLACK_BOT_TOKEN     — Slack bot token (workspace T0AHCDYQU92)
#   GITHUB_TOKEN_HAIOS  — PAT with repo read access
#   HAIOS_EXPECTED_N    — Minimum expected corpus row count
#
# CADENCE:
#   Every 8 hours: 00:00, 08:00, 16:00 UTC
#   Manual trigger always available
#
# ============================================================

name: HAIOS Harmonizer Pulse

on:
  schedule:
    - cron: '0 0,8,16 * * *'   # Every 8 hours: 00:00, 08:00, 16:00 UTC
  workflow_dispatch:             # Manual trigger
    inputs:
      force_signal:
        description: 'Override: force a specific signal output for testing'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - MAINTAIN
          - ADVANCE
          - CONVERGE
          - ESCALATE

permissions:
  contents: read

jobs:
  harmonizer-pulse:
    name: System Harmony Pulse
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
      SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
      GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN_HAIOS }}
      HAIOS_EXPECTED_N:  ${{ secrets.HAIOS_EXPECTED_N }}

    steps:
      - name: Checkout operations repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build harmonizer state input
        id: state
        run: |
          # Build a minimal state.json for the harmonizer from available signals.
          # In full deployment this will expand as subsystem connectors are added.
          # For now: corpus count from Supabase, WGS recency from Slack,
          # GitHub commit age, and carry/Z2 counts from Supabase if tables exist.

          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error
          from datetime import datetime, timezone

          state = {
            "timestamp": datetime.now(timezone.utc).isoformat(),
            "source": "github_actions_harmonizer_pulse",
            "subsystems": {}
          }

          SUPABASE_URL = os.environ.get("SUPABASE_URL", "")
          SUPABASE_KEY = os.environ.get("SUPABASE_KEY", "")
          EXPECTED_N   = int(os.environ.get("HAIOS_EXPECTED_N", "629"))

          def sb_get(path):
            try:
              req = urllib.request.Request(
                f"{SUPABASE_URL}/rest/v1/{path}",
                headers={"apikey": SUPABASE_KEY, "Authorization": f"Bearer {SUPABASE_KEY}"}
              )
              with urllib.request.urlopen(req, timeout=8) as r:
                return json.loads(r.read())
            except Exception as e:
              return {"_error": str(e)}

          # CORPUS subsystem
          corpus_rows = sb_get("acat_assessments_v1?select=count")
          if isinstance(corpus_rows, list):
            n = len(corpus_rows)
          else:
            n = None
          state["subsystems"]["CORPUS"] = {
            "row_count": n,
            "expected_n": EXPECTED_N,
            "healthy": n is not None and n >= EXPECTED_N
          }

          # CARRY subsystem
          carry_rows = sb_get("carry_items?select=id&status=eq.open")
          carry_n = len(carry_rows) if isinstance(carry_rows, list) else None
          state["subsystems"]["CARRY"] = {
            "open_items": carry_n,
            "escalate_threshold": 10,
            "escalate": carry_n is not None and carry_n >= 10
          }

          # Z2 subsystem
          z2_rows = sb_get("z2_queue?select=id,sessions_held&status=eq.pending")
          z2_n = len(z2_rows) if isinstance(z2_rows, list) else None
          z2_stale = 0
          if isinstance(z2_rows, list):
            z2_stale = sum(1 for r in z2_rows if int(r.get("sessions_held",0)) > 3)
          state["subsystems"]["Z2"] = {
            "pending": z2_n,
            "stale": z2_stale
          }

          with open("/tmp/harmonizer_state.json", "w") as f:
            json.dump(state, f, indent=2)

          print(f"State built: corpus_n={n}, carry_n={carry_n}, z2_pending={z2_n}")
          PYEOF

      - name: Run harmonizer
        id: harmonize
        run: |
          set -o pipefail
          python3 tools/haios_harmonizer_v1_0.py \
            --state /tmp/harmonizer_state.json \
            --output /tmp/harmonizer_output/ \
            2>&1 | tee /tmp/harmonizer_stdout.txt

          HARM_EXIT=${PIPESTATUS[0]}
          # Extract key signals from stdout
          PRIMARY_SIGNAL=$(grep -oP "(HARD_BLOCK|ESCALATE|CONVERGE|ADVANCE|MAINTAIN|MOLT_READY)" \
            /tmp/harmonizer_stdout.txt | head -1 || echo "MAINTAIN")
          HARMONY_SCORE=$(grep -oP "Harmony.*?:\s*\K[0-9]+" /tmp/harmonizer_stdout.txt | head -1 || echo "—")
          MOLT_READY=$(grep -c "MOLT_READY" /tmp/harmonizer_stdout.txt || echo "0")

          # Apply force_signal override if set (for manual testing)
          FORCE="${{ github.event.inputs.force_signal }}"
          if [ -n "$FORCE" ]; then
            PRIMARY_SIGNAL="$FORCE"
            echo "ℹ️ Signal overridden to: $FORCE"
          fi

          echo "primary_signal=${PRIMARY_SIGNAL}" >> $GITHUB_OUTPUT
          echo "harmony_score=${HARMONY_SCORE}"   >> $GITHUB_OUTPUT
          echo "molt_ready=${MOLT_READY}"          >> $GITHUB_OUTPUT
          echo "exit_code=${HARM_EXIT}"            >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Route notification — MAINTAIN or ADVANCE (low noise, #acat-monitor only)
        if: |
          steps.harmonize.outputs.primary_signal == 'MAINTAIN' ||
          steps.harmonize.outputs.primary_signal == 'ADVANCE'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          SIGNAL="${{ steps.harmonize.outputs.primary_signal }}"
          SCORE="${{ steps.harmonize.outputs.harmony_score }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$SIGNAL" = "ADVANCE" ]; then
            ICON="🚀"; COLOR="#36a64f"
            MSG="Gate pre-conditions met. Path to next phase is clear."
          else
            ICON="🟢"; COLOR="#36a64f"
            MSG="System healthy. Continue current trajectory."
          fi

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"C0APHCJ5WUE\",
              \"text\": \"${ICON} Harmonizer: ${SIGNAL} — ${TIMESTAMP}\",
              \"attachments\": [{
                \"color\": \"${COLOR}\",
                \"fields\": [
                  {\"title\": \"Signal\",   \"value\": \"${SIGNAL}\",  \"short\": true},
                  {\"title\": \"Score\",    \"value\": \"${SCORE}\",   \"short\": true},
                  {\"title\": \"Message\",  \"value\": \"${MSG}\",     \"short\": false},
                  {\"title\": \"Run Log\",  \"value\": \"${RUN_URL}\", \"short\": false}
                ]
              }]
            }" > /dev/null
          echo "${ICON} ${SIGNAL} posted to #acat-monitor"

      - name: Route notification — CONVERGE (#acat-monitor + #wgs-sync)
        if: steps.harmonize.outputs.primary_signal == 'CONVERGE'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          SCORE="${{ steps.harmonize.outputs.harmony_score }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PAYLOAD="{
            \"text\": \"🟡 Harmonizer: CONVERGE — ${TIMESTAMP}\",
            \"attachments\": [{
              \"color\": \"#e6a817\",
              \"fields\": [
                {\"title\": \"Signal\", \"value\": \"CONVERGE\", \"short\": true},
                {\"title\": \"Score\",  \"value\": \"${SCORE}\",  \"short\": true},
                {\"title\": \"Action\",
                 \"value\": \"One or more subsystems below harmony threshold 50. Focused session recommended.\",
                 \"short\": false},
                {\"title\": \"Run Log\", \"value\": \"${RUN_URL}\", \"short\": false}
              ]
            }]
          }"

          for CHANNEL in C0APHCJ5WUE C0AND66PT7U; do
            curl -s -X POST "https://slack.com/api/chat.postMessage" \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(echo $PAYLOAD | python3 -c \"import json,sys; d=json.load(sys.stdin); d['channel']='${CHANNEL}'; print(json.dumps(d))\")" > /dev/null
          done
          echo "🟡 CONVERGE posted to #acat-monitor and #wgs-sync"

      - name: Route notification — ESCALATE (#acat-monitor + #wgs-sync, highlighted)
        if: steps.harmonize.outputs.primary_signal == 'ESCALATE'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          SCORE="${{ steps.harmonize.outputs.harmony_score }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PAYLOAD="{
            \"text\": \"🔴 Harmonizer: ESCALATE — ${TIMESTAMP}\",
            \"attachments\": [{
              \"color\": \"#cc0000\",
              \"fields\": [
                {\"title\": \"Signal\",   \"value\": \"ESCALATE\",  \"short\": true},
                {\"title\": \"Score\",    \"value\": \"${SCORE}\",   \"short\": true},
                {\"title\": \"Action\",
                 \"value\": \"Carry queue N >= 10. All other work is secondary. Surface and resolve carry items before new construction. MKS: clear the subconscious before attempting new construction.\",
                 \"short\": false},
                {\"title\": \"Run Log\",  \"value\": \"${RUN_URL}\",  \"short\": false}
              ]
            }]
          }"

          for CHANNEL in C0APHCJ5WUE C0AND66PT7U; do
            curl -s -X POST "https://slack.com/api/chat.postMessage" \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(echo $PAYLOAD | python3 -c \"import json,sys; d=json.load(sys.stdin); d['channel']='${CHANNEL}'; print(json.dumps(d))\")" > /dev/null
          done
          echo "🔴 ESCALATE posted to both channels"

      - name: Route notification — MOLT_READY (milestone, both channels)
        if: steps.harmonize.outputs.molt_ready != '0'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PAYLOAD="{
            \"text\": \"✨ Harmonizer: MOLT_READY — ${TIMESTAMP}\",
            \"attachments\": [{
              \"color\": \"#7b2ff7\",
              \"fields\": [
                {\"title\": \"Signal\",
                 \"value\": \"MOLT_READY — All subsystems >= 70, no active hard blockers\",
                 \"short\": false},
                {\"title\": \"Action\",
                 \"value\": \"System is ready for next phase transition. Zone 2 ratification recommended.\",
                 \"short\": false},
                {\"title\": \"Run Log\", \"value\": \"${RUN_URL}\", \"short\": false}
              ]
            }]
          }"

          for CHANNEL in C0APHCJ5WUE C0AND66PT7U; do
            curl -s -X POST "https://slack.com/api/chat.postMessage" \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(echo $PAYLOAD | python3 -c \"import json,sys; d=json.load(sys.stdin); d['channel']='${CHANNEL}'; print(json.dumps(d))\")" > /dev/null
          done
          echo "✨ MOLT_READY posted to both channels"

      - name: Final summary
        run: |
          echo "================================"
          echo "  Harmonizer Pulse Complete"
          echo "  Signal : ${{ steps.harmonize.outputs.primary_signal }}"
          echo "  Score  : ${{ steps.harmonize.outputs.harmony_score }}"
          echo "  Time   : $(date -u)"
          echo "================================"
