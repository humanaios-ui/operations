# HumanAIOS Standing Audit
# Seeded by humanaios-ui/operations .github/workflows/seed-satellite-ci.yml
# Runs on every push; checks for stale references, credentials, and freshness.
#
# DO NOT EDIT THIS FILE DIRECTLY in satellite repos.
# Edit the template at humanaios-ui/operations tools/satellite-haios-audit.yml
# and re-run the Seed Satellite CI workflow to propagate changes.

name: HumanAIOS Standing Audit

on:
  push:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: A1 - Stale dimension count
        run: |
          echo "Checking for stale 6-dimension references..."
          if grep -rl "six.dimension\|6.dimension\|6-dimension" --include="*.html" . 2>/dev/null; then
            echo "::warning title=A1 AUDIT::Stale dimension count found -- instrument is 11 dimensions"
          else
            echo "PASS A1 -- no stale dimension references"
          fi

      - name: A4 - Secrets scan
        run: |
          echo "Scanning for credential patterns..."
          if grep -rl "rah_[a-zA-Z0-9]+\|sk-ant\|ghp_\|cfut_" \
            --include="*.html" --include="*.js" --include="*.json" \
            --include="*.yml" --include="*.md" \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=.github . 2>/dev/null; then
            echo "::error title=A4 AUDIT::Potential credential exposure found"
            exit 1
          else
            echo "PASS A4 -- no credential patterns found"
          fi

      - name: A5 - Security closed items check
        run: |
          echo "Verifying audit/SECURITY_CLOSED.md exists..."
          if [ -f "audit/SECURITY_CLOSED.md" ]; then
            echo "PASS A5 -- SECURITY_CLOSED.md present"
          else
            echo "::warning title=A5 AUDIT::audit/SECURITY_CLOSED.md missing -- failsafe not in place"
          fi

      - name: A7 - Freshness check (README not untouched > 90 days)
        run: |
          echo "Checking README freshness..."
          if [ -f "README.md" ]; then
            LAST_COMMIT=$(git log -1 --format="%ct" -- README.md 2>/dev/null || echo "0")
            NOW=$(date +%s)
            AGE_DAYS=$(( (NOW - LAST_COMMIT) / 86400 ))
            echo "README last touched ${AGE_DAYS} days ago"
            if [ "$AGE_DAYS" -gt 90 ]; then
              echo "::warning title=A7 AUDIT::README.md not updated in ${AGE_DAYS} days -- may be stale"
            else
              echo "PASS A7 -- README updated within 90 days"
            fi
          else
            echo "::warning title=A7 AUDIT::No README.md found"
          fi

      - name: Audit summary
        run: |
          echo "================================="
          echo "HumanAIOS Audit Complete"
          echo "Date: $(date -u)"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Commit: $GITHUB_SHA"
          echo "================================="
