# SonarQube Project Configuration
# humanaios-ui/operations repository

# Organization and project keys (configure these to match your SonarCloud setup)
sonar.organization=humanaios-ui
sonar.projectKey=humanaios-ui_operations
sonar.projectName=humanaios-ui/operations
sonar.projectVersion=1.0

# Source code location
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclusions — files/patterns to skip from analysis
sonar.exclusions=\
  **/.git/**,\
  **/.github/**,\
  **/__pycache__/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/.pytest_cache/**,\
  **/.venv/**,\
  **/venv/**,\
  **/*.egg-info/**,\
  build/**,\
  .empirica/**,\
  .empirica_reflex_logs/**,\
  **/migrations/**,\
  **/*.min.js

# Test file patterns
sonar.tests=.
sonar.test.inclusions=\
  **/tests/**/*test*.py,\
  **/test_*.py,\
  **/*_test.py,\
  **/tests/**/*.spec.js,\
  **/tests/**/*.test.js

# Coverage reports (if generated)
# sonar.python.coverage.reportPaths=coverage.xml
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language-specific settings
# Python
sonar.python.version=3.11

# Quality Gate settings (these are defaults; override in SonarCloud UI)
sonar.qualitygate.wait=true

# Security hotspot review priority
sonar.securityhotspots.severity=CRITICAL,BLOCKER

# Issue severity filtering
# Set minimum severity for reporting (BLOCKER, CRITICAL, MAJOR, MINOR, INFO)
sonar.issue.severity.min=MINOR

# Performance tuning
sonar.sourceImport.exclusions=true
sonar.log.level=INFO

# Links (documentation)
sonar.links.homepage=https://github.com/humanaios-ui/operations
sonar.links.scm=https://github.com/humanaios-ui/operations
sonar.links.ci=https://github.com/humanaios-ui/operations/actions

# Additional settings for better analysis
sonar.coverage.exclusions=\
  **/tests/**,\
  **/test_*.py,\
  tools/**

# Tag project for filtering
sonar.projectTags=ci-cd,automation,empirica
